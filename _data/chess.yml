# ============ 比赛规则 ============
rules: |
  # KC Gaming Chess 2026 - 全新赛制
  
  ## 🎮 赛季简介
  
  欢迎来到 **KC Gaming Chess 2026**！这是一个全新的竞技赛季，我们对赛制进行了全面升级。所有比赛将在全球领先的国际象棋平台 **LiChess.org** 上举行，为参赛者提供公平、专业、流畅的竞技体验。

  ---

  ## 🏆 赛制体系

  ### 👑 Elite Championship（精英月赛）
  
  - **频率**：每月最后一个周六举行
  - **时间**：15:00 开始，持续2小时
  - **时间控制**：10分钟 + 5秒增时
  - **赛制**：Arena竞技场模式
  - **奖金池**：¥50
  - **参赛要求**：所有KC学生均可参加
  
  **奖励分配**：
  - 🥇 冠军：¥25 + 100积分
  - 🥈 亚军：¥15 + 70积分
  - 🥉 季军：¥10 + 50积分
  - 第4名：35积分
  - 第5名：25积分
  - 第6-10名：15积分
  - 参赛奖：5积分
  
  ### ⭐ Master Championship（季度大师赛）
  
  - **频率**：每季度举行一次（3月、6月、9月、12月）
  - **时间**：13:00 开始，持续4小时
  - **时间控制**：15分钟 + 10秒增时
  - **赛制**：瑞士制锦标赛
  - **奖金池**：¥150
  - **参赛要求**：本季度至少参加过一场Elite赛事
  
  **奖励分配**：
  - 🥇 冠军：¥70 + 200积分
  - 🥈 亚军：¥50 + 150积分
  - 🥉 季军：¥30 + 100积分
  - 第4名：70积分
  - 第5名：50积分
  - 第6-10名：30积分
  - 参赛奖：10积分

  ---

  ## 📊 积分排名系统

  ### 年度积分榜
  
  - 积分按**自然年度**（1月1日 - 12月31日）统计
  - 每位选手的积分由所有参加的比赛累计
  - 可通过页面菜单切换查看不同年份的排名
  - 年度总积分最高者将获得"年度总冠军"称号
  
  ### 积分计算规则
  
  - Elite赛事：根据排名获得5-100积分不等
  - Master赛事：根据排名获得10-200积分不等
  - 参赛即有积分奖励，鼓励持续参与
  - 积分实时更新，赛后自动计算
  
  ### 特殊成就
  
  - **Grand Slam**：在一个赛季中赢得所有4场Master赛事
  - **Elite Master**：赢得6场或以上Elite赛事
  - **Consistency Award**：参加全年所有16场比赛
  - **Rapid Rise**：单季度积分增长最快

  ---

  ## ⚙️ 比赛规则

  ### 参赛资格
  
  1. **Elite Championship**：所有昆山康桥学校学生均可参加
  2. **Master Championship**：需在本季度至少参加过一场Elite赛事
  3. 首次参赛需注册LiChess账号，建议使用真实英文姓名

  ### 报名方式
  
  1. 点击比赛卡片上的"立即报名"链接
  2. 进入LiChess比赛页面
  3. 输入比赛密码：`KCIS2026`
  4. 确认报名
  
  **重要提示**：
  - 建议提前30分钟报名
  - 比赛开始后仍可加入，但会错过部分对局
  - 首次参赛请提前熟悉LiChess平台操作

  ### 比赛规则
  
  1. **公平竞技**：
     - 严禁使用任何外部辅助工具（引擎、AI等）
     - LiChess拥有先进的反作弊系统
     - 违规者将被永久禁赛，取消所有成绩和奖励
  
  2. **身份验证**：
     - 有奖金的比赛需要身份验证
     - 管理员会在比赛前/后通过LiChess聊天验证身份
     - 使用真实姓名作为用户名可加快验证流程
  
  3. **时间控制**：
     - Elite：10+5（10分钟基础时间 + 每步5秒增时）
     - Master：15+10（15分钟基础时间 + 每步10秒增时）
     - 超时判负，请确保网络稳定
  
  4. **对局规则**：
     - 遵循国际象棋联合会（FIDE）标准规则
     - 和棋需双方同意
     - 对手掉线/弃赛由系统自动判定

  ### 奖金发放
  
  - **发放时间**：比赛结束后3个工作日内
  - **发放方式**：通过微信/支付宝转账
  - **身份核实**：需完成身份验证后才能领取奖金

  ---

  ## 📱 技术支持

  ### 平台说明
  
  - **比赛平台**：LiChess.org（免费、无广告、开源）
  - **推荐浏览器**：Chrome、Edge、Safari、Firefox
  - **移动设备**：支持iOS/Android LiChess App
  - **网络要求**：稳定的互联网连接（建议Wi-Fi）

  ### 常见问题

  **Q: 我是新手，能参加吗？**  
  A: 当然可以！Elite赛事欢迎所有水平的选手。建议先参加几场Elite积累经验后再挑战Master。

  **Q: 如果迟到了还能参赛吗？**  
  A: 可以，但会错过开始时的部分对局，影响总分。建议准时参加。

  **Q: 比赛中网络断线怎么办？**  
  A: LiChess会保留你的时间，重新连接后可继续比赛。但超时仍会判负，请确保网络稳定。

  **Q: 如何查看我的积分？**  
  A: 比赛结束后，积分会自动更新到排行榜上。你可以在网页上查看实时排名。

  **Q: 可以同时参加Elite和Master吗？**  
  A: 可以！我们鼓励选手参加所有比赛，积累更多积分和经验。

  ---

  ## 📞 联系我们

  如有任何问题、建议或需要技术支持，欢迎联系：

  - **邮箱**：info@kcisec.site
  - **LiChess管理员**：EricStoneChina
  - **QQ群**：[待公布]

  ---

  ## 🎯 寄语

  KC Gaming Chess 2026是一个全新的开始。我们致力于为所有热爱国际象棋的同学提供一个公平、专业、有趣的竞技平台。无论你是初学者还是高手，都欢迎加入我们的大家庭！

  让我们一起在棋盘上展现智慧与策略，在竞技中收获成长与友谊。

  **2026，让我们开始全新的征程！** ♔♕♖♗♘♙
